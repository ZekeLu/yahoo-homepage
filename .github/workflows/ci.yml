name: CI — React Loop

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  react-loop:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Cache node_modules ────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # ── LOOP STEP 1: Lint ──────────────────────────────────────────
      - name: Lint (ESLint)
        run: npm run lint

      # ── LOOP STEP 2: Test ──────────────────────────────────────────
      - name: Test (Jest)
        run: npm test -- --ci --passWithNoTests --coverage

      # ── Coverage badge ─────────────────────────────────────────────
      - name: Extract coverage percentage
        if: always()
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(Math.round(c.total.statements.pct))")
            echo "pct=$COVERAGE" >> "$GITHUB_OUTPUT"
          else
            echo "pct=N/A" >> "$GITHUB_OUTPUT"
          fi

      - name: Create coverage badge
        if: github.ref == 'refs/heads/main' && steps.coverage.outputs.pct != 'N/A'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.pct }}';
            const color = coverage >= 80 ? 'brightgreen' : coverage >= 60 ? 'yellow' : 'red';
            const badge = `![Coverage](https://img.shields.io/badge/coverage-${coverage}%25-${color})`;
            core.info(`Coverage badge: ${badge}`);

      # ── LOOP STEP 3: Build ─────────────────────────────────────────
      # This catches Next.js errors (e.g. missing 'use client') BEFORE deploy
      - name: Build (Next.js)
        run: npm run build
        env:
          NODE_ENV: production

      # ── Preview deployment comment ─────────────────────────────────
      - name: Post deployment summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });
            const vercelCheck = checks.check_runs.find(c => c.name.toLowerCase().includes('vercel'));
            const previewUrl = vercelCheck?.details_url || 'https://yahoo-homepage.vercel.app';
            const coverage = '${{ steps.coverage.outputs.pct }}';

            const body = [
              '## Deployment Summary',
              '',
              `| Item | Value |`,
              `|------|-------|`,
              `| Preview URL | ${previewUrl} |`,
              `| Coverage | ${coverage}% |`,
              `| Lint | Passed |`,
              `| Tests | Passed |`,
              `| Build | Passed |`,
              '',
              `> Auto-generated by CI — React Loop`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
